version: '3.8'

services:
  # Servicio de la aplicación que genera logs
  app:
    build: .
    container_name: mi-app-logs
    volumes:
      - ./logs-host:/app/logs
    networks:
      - app-network
    restart: unless-stopped

  # Servicio web (Nginx) para servir los logs
  web:
    image: nginx:alpine
    container_name: nginx-logs-viewer
    ports:
      - "8080:80"
    volumes:
      - ./logs-host:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - app-network
    depends_on:
      - app
    restart: unless-stopped

networks:
  app-network:
    driver: bridge