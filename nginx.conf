server {
    listen 80;
    server_name localhost;

    location / {
        root /usr/share/nginx/html;
        autoindex on;
        autoindex_exact_size off;
        autoindex_localtime on;
        charset utf-8;
    }

    # Configuración para ver archivos .log como texto plano
    location ~* \.log$ {
        root /usr/share/nginx/html;
        default_type text/plain;
        charset utf-8;
    }
}